<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMASEN File Uploader</title>
    <script src="./libs/react.min.js"></script>
    <script src="./libs/react-dom.min.js"></script>
    <script src="./libs/three.min.js"></script>
    <script src="./libs/babel.min.js"></script>
    <script src="./libs/gsap.min.js"></script>
    <script src="./libs/GLTFLoader.js"></script>
    <script src="./libs/peerjs.min.js"></script>
    

    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #adc5d8; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        #ui-layer { position: relative; z-index: 2; pointer-events: none; height: 100vh; display: flex; flex-direction: column; justify-content: space-between; padding: 40px; color: #76563d; }
        .upload-card { 
            pointer-events: auto; background: rgba(196, 198, 198, 0.3); backdrop-filter: blur(15px);
            padding: 30px; border-radius: 24px; border: 1px solid rgba(162,133,105,0.1); width: 350px;
        }
        .category-label { font-size: 24px; font-weight: bold; color: #a28569; margin-bottom: 10px; text-transform: uppercase; }
        .server-status { font-size: 12px; color: #2d5a27; margin-bottom: 10px; }
        input[type="file"] { background: rgba(106, 58, 14, 0.3); border: none; padding: 10px; width: 100%; border-radius: 8px; color: white; margin: 15px 0; }
        button { 
            width: 100%; padding: 15px; border-radius: 12px; border: none; 
            background: linear-gradient(45deg, #516f8e, #00c0aa); color: white; font-weight: bold; cursor: pointer;
            transition: transform 0.2s;
        }
        button:disabled { background: #999; cursor: not-allowed; }
        button:active { transform: scale(0.95); }
        .status-bar { height: 4px; background: #333; margin-top: 20px; border-radius: 2px; overflow: hidden; }
        .status-fill { height: 100%; background: #00d4ff; width: 0%; transition: width 0.3s; }
    </style>
</head>
<body>

<div id="canvas-container"></div>
<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- ส่วนของ Three.js Engine ---
    const ThreeScene = ({ selectedCategory, onSelect, onPosUpdate }) => {
        const mountRef = useRef(null);

        useEffect(() => {
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            mountRef.current.appendChild(renderer.domElement);

            const loader = new THREE.GLTFLoader();

            // แสงไฟแบบ Cinematic
            const light = new THREE.DirectionalLight(0xffffff, 2); // new THREE.PointLight(0x00d4ff, 10, 100);
            light.position.set(10, 10, 10);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0xffffff, 1.8));

            // สร้างกระเป๋าเอกสาร (Briefcase) เป็น Box Primitives ง่ายๆ
            const categories = ['qt', 'po', 'inv'];
            const models = {}; // const briefcases = [];

            categories.forEach((cat, i) => {
                
                loader.load(`./models/${cat}.glb`, 
                    (gltf) => {
                        const model = gltf.scene;
                        model.position.x = (i - 1) * 9; // วางห่างกัน
                        model.position.y = 1.5;
                        model.userData = { id: cat };
                        scene.add(model);
                        models[cat] = model;
                        console.log(`Loaded: ${cat}`);
                        model.scale.set(8, 8, 8);
                    },
                    undefined,
                    (error) => {
                        console.error('Error loading model:', error);
                    }
                );
            });

            camera.position.z = 10;

            // Animation Loop
            const animate = () => {
                requestAnimationFrame(animate);
                
                Object.keys(models).forEach(key => {
                    const m = models[key];
                    if (key === selectedCategory) {
                        m.rotation.y += 0.01;
                        m.scale.set(10, 10, 10);
                        
                        // --- คำนวณตำแหน่ง 3D ไปยัง 2D Screen ---
                        const vector = m.position.clone();
                        vector.project(camera);
                        const x = (vector.x + 1) * window.innerWidth / 2;
                        const y = -(vector.y - 1) * window.innerHeight / 2;
                        onPosUpdate({ x, y }); // ส่งค่ากลับไปให้ React UI
                    } else {
                        m.rotation.y *= 0.9;
                        m.scale.set(8, 8, 8);
                    }
                });
                renderer.render(scene, camera);
            };
            animate();

            // Raycaster สำหรับคลิกเลือกกระเป๋า
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();

            const onClick = (e) => {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(scene.children, true);
                if (intersects.length > 0) {
                    let obj = intersects[0].object;
                    while(obj.parent && !obj.userData.id) obj = obj.parent; // ไล่หา ID ในกรณีเป็นโมเดลซับซ้อน
                    if(obj.userData.id) onSelect(obj.userData.id);
                }
            };

            window.addEventListener('click', onClick);
            return () => {
                window.addEventListener('click', onClick);
                mountRef.current.removeChild(renderer.domElement);
            }
        }, [selectedCategory]);

        return <div ref={mountRef} style={{ width: '100%', height: '100%' }} />;
    };

    // --- ส่วนของ UI React ---
    const App = () => {
        const [category, setCategory] = useState('po');
        const [uiPos, setUiPos] = useState({ x: window.innerWidth/2, y: window.innerHeight/2 }); // const [uiPos, setUiPos] = useState({ x: 0, y: 0 });
        const [status, setStatus] = useState("กำลังเชื่อมต่อเซิร์ฟเวอร์...");
        const [progress, setProgress] = useState(0);
        const [uploading, setUploading] = useState(false);
        const peerRef = useRef(null);
        const connRef = useRef(null);

        useEffect(() => {
            // สร้าง Peer สำหรับผู้ใช้งาน
            const peer = new Peer();
            peerRef.current = peer;

            peer.on('open', () => {
                // เชื่อมต่อไปยัง Server ID ของคุณ
                const conn = peer.connect('MSA-SERVER-ID-2026');
                connRef.current = conn;

                conn.on('open', () => setStatus("✅ เชื่อมต่อเซิร์ฟเวอร์สำเร็จ"));
                conn.on('data', (data) => {
                    setUploading(false);
                    setProgress(0);
                    alert(data.msg);
                    setStatus("✅ " + data.msg);
                });
                conn.on('error', () => setStatus("❌ การเชื่อมต่อขัดข้อง"));
            });

            return () => peer.destroy();
        }, []);
        
        const handleUpload = async () => {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return alert("กรุณาเลือกไฟล์");
            if (!connRef.current) return alert("ยังไม่ได้เชื่อมต่อกับเซิร์ฟเวอร์");

            setUploading(true);
            setStatus("🚀 กำลังส่งไฟล์...");
            setProgress(30);

            const arrayBuffer = await file.arrayBuffer();
            
            connRef.current.send({
                type: 'UPLOAD',
                category: category,
                fileName: file.name,
                fileData: arrayBuffer
            });

            /* // อ่านไฟล์เป็นก้อนข้อมูล (Blob/ArrayBuffer)
            const reader = new FileReader();
            reader.onload = (e) => {
                conn.send({
                    type: 'UPLOAD',
                    category: category,
                    fileName: file.name,
                    fileData: e.target.result // ข้อมูลไฟล์ดิบ
                });
                alert("ส่งไฟล์สำเร็จ!"); 
            };
            reader.readAsArrayBuffer(file); */

            setProgress(100);
            document.getElementById('fileInput').value = ""; // Reset input
        };
      
            
        const catNames = { qt: 'Quotation', po: 'Purchase Order', inv: 'Invoice' };

        return (
            <>
                <div id="canvas-container">
                    <ThreeScene 
                        selectedCategory={category} 
                        onSelect={setCategory} 
                        onPosUpdate={setUiPos} 
                    />
                </div>
                <div id="ui-layer">
                    <div className="header">
                        <h1>IMASEN FILE SYSTEM</h1>
                        <p>เลือกประเภทกระเป๋าเอกสาร เพื่อเลือกหมวดหมู่เอกสาร</p>
                    </div>
                    
                    <div className="upload-card" style={{
                        position: 'absolute',
                        left: `${uiPos.x}px`,
                        top: `${uiPos.y + 160}px`, // ให้เยื้องลงมาใต้กระเป๋า
                        transform: 'translateX(-50%)',
                        transition: 'all 0.1s ease-out'
                    }}>
                        <div className="category-label">{catNames[category]}</div>
                        <div className="server-status">{status}</div>
                        <input type="file" id="fileInput" accept=".pdf" />
                        <button onClick={handleUpload} disabled={uploading}>
                            {uploading ? 'กำลังส่ง...' : 'SEND TO IMASEN'}
                        </button>
                        {uploading && (
                            <div className="status-bar">
                                <div className="status-fill" style={{ width: `${progress}%` }}></div>
                            </div>
                        )}
                    </div>
                </div>
            </>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>

</body>
</html>
