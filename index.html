<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMASEN File Uploader System</title>
    <script src="./libs/react.min.js"></script>
    <script src="./libs/react-dom.min.js"></script>
    <script src="./libs/three.min.js"></script>
    <script src="./libs/babel.min.js"></script>
    <script src="./libs/gsap.min.js"></script>
    <script src="./libs/GLTFLoader.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #adc5d8; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        #ui-layer { position: relative; z-index: 2; pointer-events: none; height: 100vh; display: flex; flex-direction: column; justify-content: space-between; padding: 40px; color: #76563d; box-sizing: border-box; }
        .upload-card { 
            pointer-events: auto; background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(15px);
            padding: 30px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.2); width: 350px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }
        .category-label { font-size: 24px; font-weight: bold; color: #76563d; margin-bottom: 5px; text-transform: uppercase; }
        .server-status { font-size: 13px; font-weight: 500; margin-bottom: 15px; }
        input[type="file"] { background: rgba(255, 255, 255, 0.5); border: 1px solid rgba(0,0,0,0.1); padding: 10px; width: 100%; border-radius: 8px; color: #333; margin: 15px 0; box-sizing: border-box; }
        button { 
            width: 100%; padding: 15px; border-radius: 12px; border: none; 
            background: linear-gradient(45deg, #516f8e, #00c0aa); color: white; font-weight: bold; cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        button:disabled { background: #999 !important; cursor: not-allowed; }
        button:active { transform: scale(0.95); }
        .status-bar { height: 6px; background: rgba(0,0,0,0.1); margin-top: 20px; border-radius: 3px; overflow: hidden; }
        .status-fill { height: 100%; background: #00c0aa; width: 0%; transition: width 0.3s ease-out; }
    </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- ส่วนของ Three.js Engine ---
    const ThreeScene = ({ selectedCategory, onSelect, onPosUpdate }) => {
        const mountRef = useRef(null);

        useEffect(() => {
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            mountRef.current.appendChild(renderer.domElement);

            const loader = new THREE.GLTFLoader();

            // แสงไฟระบบ Cinematic สำหรับส่องโมเดลกระเป๋า
            const light = new THREE.DirectionalLight(0xffffff, 2);
            light.position.set(10, 10, 10);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0xffffff, 1.8));

            const categories = ['qt', 'po', 'inv'];
            const models = {};

            categories.forEach((cat, i) => {
                loader.load(`./models/${cat}.glb`, 
                    (gltf) => {
                        const model = gltf.scene;
                        model.position.x = (i - 1) * 9; // วางระยะห่างโมเดลกระเป๋าให้เหมาะสม
                        model.position.y = 1.5;
                        model.userData = { id: cat };
                        scene.add(model);
                        models[cat] = model; // บันทึกลง Object เมื่อโหลดเสร็จแล้วจริง ๆ
                        model.scale.set(8, 8, 8);
                    },
                    undefined,
                    (error) => {
                        console.error('Error loading model:', error);
                    }
                );
            });

            camera.position.z = 10;

            // Animation Loop ปรับปรุงใหม่เพื่อป้องกันการพัง (Crash)
            let animationFrameId;
            const animate = () => {
                animationFrameId = requestAnimationFrame(animate);
                
                categories.forEach(key => {
                    const m = models[key];
                    if (!m) return; // 🛡️ ดักพัง: ถ้าโมเดลชิ้นนี้ยังโหลดไม่เสร็จ ให้ข้ามลูปนี้ไปก่อน
                    
                    if (key === selectedCategory) {
                        m.rotation.y += 0.01;
                        m.scale.set(10, 10, 10);
                        
                        // คำนวณพิกัด 3D ออกมาเป็น 2D หน้าจอเบราว์เซอร์
                        const vector = m.position.clone();
                        vector.project(camera);
                        const x = (vector.x + 1) * window.innerWidth / 2;
                        const y = -(vector.y - 1) * window.innerHeight / 2;
                        onPosUpdate({ x, y }); 
                    } else {
                        m.rotation.y *= 0.9;
                        m.scale.set(8, 8, 8);
                    }
                });
                renderer.render(scene, camera);
            };
            animate();

            // ระบบตรวจจับการคลิกเลือกโมเดลกระเป๋าเอกสาร 3 มิติ
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();

            const onClick = (e) => {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(scene.children, true);
                if (intersects.length > 0) {
                    let obj = intersects[0].object;
                    while(obj.parent && !obj.userData.id) obj = obj.parent; 
                    if(obj.userData.id) onSelect(obj.userData.id);
                }
            };

            window.addEventListener('click', onClick);
            
            // Cleanup เคลียร์แรมและหยุดแอนิเมชันให้หมดเมื่อเปลี่ยน Component
            return () => {
                window.removeEventListener('click', onClick);
                cancelAnimationFrame(animationFrameId);
                if (mountRef.current && renderer.domElement) {
                    mountRef.current.removeChild(renderer.domElement);
                }
            }
        }, [selectedCategory]);

        return <div ref={mountRef} style={{ width: '100%', height: '100%' }} />;
    };

    // --- ส่วนของ UI React
    const App = () => {
        const [category, setCategory] = useState('po');
        const [uiPos, setUiPos] = useState({ x: window.innerWidth / 2, y: window.innerHeight / 2 }); 
        const [status, setStatus] = useState("⏳ กำลังเชื่อมต่อเซิร์ฟเวอร์...");
        const [progress, setProgress] = useState(0);
        const [uploading, setUploading] = useState(false);
        const pcRef = useRef(null);
        const dcRef = useRef(null);

        useEffect(() => {
            // ต่อสายตรงเข้าเซิร์ฟเวอร์ผ่าน Ngrok
            const ws = new WebSocket('wss://discourse-dubbed-unsafe.ngrok-free.dev');
            const pc = new RTCPeerConnection({
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' }
                ]
            });
            pcRef.current = pc;

            // ตัวแปรบริหารคิวสัญญาณฝั่งหน้าบ้าน กันปัญหาเน็ตมือถือความหน่วงสูง
            let isRemoteDescSet = false;
            let remoteCandQueue = [];

            const dc = pc.createDataChannel('fileChannel');
            dcRef.current = dc;

            dc.onopen = () => {
                setStatus("✅ เชื่อมต่อสำเร็จ");
                // 🛡️ แก้ไข: ห้ามสั่ง ws.close() ตัดสายทิ้งทันที ให้เปิดท่อซ็อกเก็ตทิ้งไว้เป็นสะพานเคลียร์สายสัญญาณเครือข่ายจนเสร็จสิ้น
            };

            dc.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'STATUS') {
                        setUploading(false);
                        setProgress(0);
                        setStatus("✅ " + data.msg);
                        alert(data.msg);
                    }
                } catch (err) {
                    console.error("Error handling message:", err);
                }
            };

            pc.onicecandidate = (event) => {
                // ส่งข้อมูลเครือข่ายกลับไปหาหลังบ้าน และเช็กค่าว่างเพื่อไม่ให้ฝั่งนู้นระเบิด
                if (event.candidate && event.candidate.candidate) {
                    if (ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({ 
                            type: 'CANDIDATE', 
                            candidate: event.candidate.candidate, 
                            mid: event.candidate.sdpMid 
                        }));
                    }
                }
            };

            ws.onmessage = async (event) => {
                try {
                    const msg = JSON.parse(event.data);
                
                    if (msg.type === 'SIGNAL') {
                        // จัดการลงทะเบียนสิทธิ์สัญญาณหลัก
                        await pc.setRemoteDescription(new RTCSessionDescription({ type: msg.sdpType, sdp: msg.sdp }));
                        isRemoteDescSet = true;

                        // ปลดล็อกคิวสะสม Candidate ฝั่งหน้าบ้าน
                        if (remoteCandQueue.length > 0) {
                            for (const cand of remoteCandQueue) {
                                if (cand.candidate) {
                                    await pc.addIceCandidate(new RTCIceCandidate({ candidate: cand.candidate, sdpMid: cand.mid }));
                                }
                            }
                            remoteCandQueue = [];
                        }

                        if (msg.sdpType === 'offer') {
                            const answer = await pc.createAnswer();
                            await pc.setLocalDescription(answer);
                            ws.send(JSON.stringify({ type: 'SIGNAL', sdp: answer.sdp, sdpType: 'answer' }));
                        }
                    } 
                    else if (msg.type === 'CANDIDATE') {
                        // ดักจับบั๊ก: หากสัญญาณหลักยังประมวลผลไม่เสร็จ ให้เก็บลงกล่องพักคิวไว้ก่อนชั่วคราว
                        if (!isRemoteDescSet) {
                            remoteCandQueue.push({ candidate: msg.candidate, mid: msg.mid });
                        } else {
                            if (msg.candidate) {
                                await pc.addIceCandidate(new RTCIceCandidate({ candidate: msg.candidate, sdpMid: msg.mid }));
                            }
                        }
                    }
                } catch (err) {
                    console.error("❌ ข้อผิดพลาดในการประมวลผลสัญญาณหน้าบ้าน:", err);
                }
            };

            ws.onopen = async () => {
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                ws.send(JSON.stringify({ type: 'SIGNAL', sdp: offer.sdp, sdpType: 'offer' }));
            };

            // ปรับแต่งการเช็กสถานะการแจ้งเตือนไม่ให้รบกวนจังหวะส่งไฟล์จริง
            ws.onerror = () => { if(!dcRef.current || dcRef.current.readyState !== 'open') setStatus("❌ ระบบโครงข่ายขัดข้อง"); };
            ws.onclose = () => { if(!dcRef.current || dcRef.current.readyState !== 'open') setStatus("❌ เซิร์ฟเวอร์ปิดสัญญาณ"); };

            return () => {
                if (pcRef.current) pcRef.current.close();
                if (ws) ws.close();
            };
        }, []);
    
        const handleUpload = async () => {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput ? fileInput.files[0] : null;
        
            if (!file) return alert("กรุณาเลือกไฟล์ PDF ที่ต้องการส่ง");
            if (!dcRef.current || dcRef.current.readyState !== 'open') {
                return alert("ไม่สามารถส่งไฟล์ได้ เนื่องจากในการเชื่อมต่อหลุด");
            }

            setUploading(true);
            setStatus("🚀 กำลังเตรียมหั่นไฟล์และส่งข้อมูล...");
            setProgress(0);

            try {
                const reader = new FileReader();
                reader.onload = () => {
                    const base64Data = reader.result.split(',')[1];
                    const CHUNK_SIZE = 16384; 
                    let offset = 0;
                    const totalBytes = base64Data.length;

                    dcRef.current.send(JSON.stringify({
                        type: 'START_UPLOAD',
                        category: category,
                        fileName: file.name
                    }));

                    function sendNextChunk() {
                        if (offset < totalBytes) {
                            const chunk = base64Data.slice(offset, offset + CHUNK_SIZE);
                        
                            dcRef.current.send(JSON.stringify({
                                type: 'CHUNK',
                                chunkData: chunk
                            }));

                            offset += CHUNK_SIZE;
                            const currentProgress = Math.min(100, (offset / totalBytes) * 100);
                            setProgress(Math.floor(currentProgress));

                            setTimeout(sendNextChunk, 5);
                        } else {
                            dcRef.current.send(JSON.stringify({ type: 'END_UPLOAD' }));
                            setStatus("💾 เซิร์ฟเวอร์กำลังบันทึกไฟล์...");
                            if (fileInput) fileInput.value = "";
                        }
                    }

                    sendNextChunk();
                };
            
                reader.readAsDataURL(file);

            } catch (error) {
                setUploading(false);
                setProgress(0);
                setStatus("❌ อัปโหลดล้มเหลว");
                alert("เกิดข้อผิดพลาด: " + error.message);
            }
        };
        const catNames = { qt: 'Quotation (ใบเสนอราคา)', po: 'Purchase Order (ใบสั่งซื้อ)', inv: 'Invoice (ใบแจ้งหนี้)' };

        return (
            <>
                <div id="canvas-container">
                    <ThreeScene 
                        selectedCategory={category} 
                        onSelect={setCategory} 
                        onPosUpdate={setUiPos} 
                    />
                </div>
                <div id="ui-layer">
                    <div className="header">
                        <h1 style={{ margin: '0 0 5px 0', fontSize: '28px' }}>IMASEN FILE SYSTEM</h1>
                        <p style={{ margin: 0, opacity: 0.8 }}>คลิกเลือกประเภทกระเป๋าเอกสาร 3D เพื่อเปลี่ยนหมวดหมู่จัดเก็บเอกสาร</p>
                    </div>
                    
                    <div className="upload-card" style={{
                        position: 'absolute',
                        left: `${uiPos.x}px`,
                        top: `${uiPos.y + 140}px`, 
                        transform: 'translateX(-50%)',
                        transition: 'all 0.05s ease-out'
                    }}>
                        <div className="category-label">{catNames[category]}</div>
                        <div className="server-status" style={{ color: status.includes('❌') ? '#cc0000' : (status.includes('✅') ? '#2d5a27' : '#76563d') }}>
                            {status}
                        </div>
                        <input type="file" id="fileInput" accept=".pdf" />
                        <button onClick={handleUpload} disabled={uploading || !status.includes('✅')}>
                            {uploading ? 'กำลังส่งข้อมูล...' : 'SEND TO IMASEN'}
                        </button>
                        
                        {uploading && (
                            <div className="status-bar">
                                <div className="status-fill" style={{ width: `${progress}%` }}></div>
                            </div>
                        )}
                    </div>
                </div>
            </>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>

</body>
</html>
